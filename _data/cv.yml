    Research Experience:
      - company: NanoX Lab, Purdue University
        position: Research Assistant, advised by Prof. Haitong Li
        location: West Lafayette, IN
        start_date: 2023-08
        end_date: present
        summary: Heterogeneous Chiplet Co-Design for In-Memory Edge LLM Acceleration
        highlights:
          - Designed 3D-CIMlet, a heterogeneous chiplet framework for in-memory acceleration of edge LLM inference and continual learning, with thermal-aware modeling and multi-die design exploration for 2.5D/3D systems.
          - Developed memory-reliability-aware chiplet mapping strategies for heterogeneous integration of RRAM, eDRAM, and hybrid dies across mixed technology nodes.
          - Achieved 9.3x/12x energy efficiency improvement and 90.2%/92.5% EDP reduction in 2.5D/3D designs for scalable edge LLM deployment.

      - company: NanoX Lab, Purdue University
        position: Research Assistant, advised by Prof. Haitong Li
        location: West Lafayette, IN
        start_date: 2023-08
        end_date: present
        summary: Floating-Point Compute-in-Memory Engine with RRAM-eDRAM Fusion
        highlights:
          - Developed a floating-point compute-in-memory engine with RRAM-eDRAM fusion macros and multiply-accumulate-compute dataflow for high-speed, energy-efficient edge AI acceleration.
          - Implemented a pipelined accumulator and power-aware synthesis with a multi-Vt library, decoupled gain-cell eDRAM read/write ports, and doubled effective bandwidth through interleaved macro access.
          - Achieved 38.5 TFLOPS/W energy efficiency at 600 MHz, 1.75% Tiny-ViT accuracy degradation on CIFAR-10, and up to 4.84x/8.48x figure-of-merit gains over prior SRAM/RRAM baselines.

      - company: NanoX Lab, Purdue University
        position: Research Assistant, advised by Prof. Haitong Li
        location: West Lafayette, IN
        start_date: 2023-08
        end_date: present
        summary: Device-Circuit Co-Design of Reconfigurable Memory for a 3D LLM Accelerator
        highlights:
          - Developed a 2T oxide-semiconductor non-volatile gain-cell memory enabling in-memory reconfiguration between static and dynamic operations for LLM inference and continual learning.
          - Implemented a 3D sandwich integration scheme combining oxide-semiconductor logic and memory layers on CMOS, with reconfigurable FP/INT compute modes and 3D inter-tier dataflow optimization.
          - Achieved 32.9 TOPS/W energy efficiency and 102.4 TOPS/mm2 compute density, with 2.3x/3.2x gains over planar CMOS and DRAM baselines.

      - company: NanoX Lab, Purdue University
        position: Research Assistant, advised by Prof. Haitong Li
        location: West Lafayette, IN
        start_date: 2023-08
        end_date: present
        summary: Cross-Layer Co-Design for Vector-Symbolic Hardware Acceleration
        highlights:
          - Built a cross-layer design framework for vector-symbolic computing that unifies algorithm, architecture, and hardware perspectives for efficient cognitive computing acceleration.
          - Proposed heterogeneous memory architectures achieving up to 86% lower latency and 2.6x energy efficiency over homogeneous designs.
          - Identified a unified VSA hardware-algorithm co-design framework and memory-centric VSA design template for scalable brain-inspired AI systems.

      - company: NanoX Lab, Purdue University
        position: Research Assistant, advised by Prof. Haitong Li
        location: West Lafayette, IN
        start_date: 2023-08
        end_date: present
        summary: System-Technology Co-Optimization for Representation and Memory Heterogeneity
        highlights:
          - Designed an STCO framework integrating algorithmic representations with heterogeneous memory for edge systems across DNNs, LLMs, VSA, and optimization solvers.
          - Developed memory-centric model partitioning and mapping on heterogeneous chiplets and characterized memory units that combine compute, storage, and adaptive processing.
          - Unified representation-driven workloads under a cross-layer modeling framework for scalable, energy-efficient edge intelligence accelerators.

      - company: Center of Computational Evolutionary Intelligence, Duke University
        position: Research Assistant, advised by Prof. Yiran Chen and Prof. Helen (Hai) Li
        location: Durham, NC
        start_date: 2022-01
        end_date: 2022-10
        summary: SRAM Computing-in-Memory Macro Design
        highlights:
          - Designed an 8T SRAM-CIM macro supporting multi-bit MAC operations for edge AI and up to 3-bit sensing read-out circuits.
          - Implemented 8T computing cells and multi-bit current-domain read-out circuits with a customized flash ADC to improve area efficiency.
          - Developed an auto error correction scheme with digital near-memory processing.

      - company: Efficient, Secure and Intelligent Computing Lab, Arizona State University
        position: Research Assistant, advised by Prof. Deliang Fan
        location: Tempe, AZ
        start_date: 2022-06
        end_date: 2022-08
        summary: Processing-in-Memory Evaluation Tool Optimization
        highlights:
          - Developed the PIMA-SIM processing-in-memory evaluation tool on top of NVSIM to extract delay, energy, and area data for non-volatile memory and SRAM PIM technologies.
          - Improved PIM-level configuration flexibility by supporting customized row activation schemes and sub-array, mat, and bank-level components.
          - Evaluated high-density 28 nm STT-assisted SOT-MRAM, showing 95.4% lower energy, 1.6x speedup, and 65% lower area overhead compared with SRAM.

      - company: SEU-FEI Nano-Pico Center, Southeast University
        position: Undergraduate Student, advised by Prof. Litao Sun
        location: Nanjing, China
        start_date: 2020-04
        end_date: 2020-06
        summary: Electro-oculogram Signal Processing and Analysis
        highlights:
          - Built EOG signal collection, 300x amplification, and 50 Hz low-pass filtering modules using INA333, OPA2333, and right-leg-drive circuitry.
          - Designed and tested the PCB in Altium Designer and analyzed signal-processing performance in Matlab with the SEED database.
          - Retained analog EOG characteristics with 1.76% high-pass filter cutoff frequency error for downstream HCI systems.

    Design Projects:
      - name: Programmable Accelerator Architecture
        summary: GPU kernel and scheduler optimization.
        highlights:
          - Developed CUDA kernels for CNN convolution and GEMM and optimized image filtering and pooling pipelines.
          - Designed CTA-level schedulers that improved IPC and reduced L1/L2 cache miss rates.
          - Built a many-thread-aware prefetcher and CUDA micro-benchmark for validation.

      - name: 32-bit MIPS Processor Design
        summary: Computer architecture project using Verilog, Design Compiler, and Mentor Graphics.
        highlights:
          - Architected and synthesized a 5-stage pipelined MIPS processor with registers and an arithmetic-logic unit.
          - Optimized 0.13 um ALU performance using a carry-lookahead adder, output selection, and logic reconfiguration, improving area and power by approximately 30%.

      - name: Memory-Augmented Transformer for Sequence Modeling
        summary: AI project using PyTorch and CUDA.
        highlights:
          - Developed autoregressive image generation on MNIST and language modeling on WikiText with memory optimization.
          - Explored memory-state processing and integration in memory-augmented Transformers for longer sequence processing.

